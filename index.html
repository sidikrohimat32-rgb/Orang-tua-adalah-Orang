<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Keluarga</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        .container { background: white; width: 90%; max-width: 400px; padding: 25px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); text-align: center; }
        
        /* Tampilan Menu Utama */
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .btn-nama { padding: 15px; border: none; background: #4f46e5; color: white; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-nama:hover { background: #3730a3; transform: scale(1.05); }

        /* Tampilan Detail (Menu Orang Tua) */
        .hidden { display: none; }
        .detail-card { padding: 30px 10px; }
        .parent-title { color: #64748b; font-size: 0.9rem; margin-bottom: 10px; }
        .parent-name { font-size: 2rem; font-weight: bold; color: #1e293b; margin-bottom: 25px; }
        .btn-back { padding: 10px 20px; background: #e2e8f0; border: none; border-radius: 5px; cursor: pointer; color: #475569; font-weight: 600; }
        
        h2 { margin-top: 0; color: #1e293b; }
    </style>
</head>
<body>

<div class="container">
    <div id="halaman-utama">
        <h2>Pilih Nama</h2>
        <div class="grid-menu" id="menu-nama">
            </div>
    </div>

    <div id="halaman-detail" class="hidden">
        <div class="detail-card">
            <div class="parent-title" id="info-teks">Orang tua dari Ridho adalah:</div>
            <div class="parent-name" id="nama-orang-tua">Kamto</div>
            <button class="btn-back" onclick="kembali()">← Kembali</button>
        </div>
    </div>
</div>
